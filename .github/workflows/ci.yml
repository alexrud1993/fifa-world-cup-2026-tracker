name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate local data
        run: npm run data:validate

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Build for GitHub Pages path
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
