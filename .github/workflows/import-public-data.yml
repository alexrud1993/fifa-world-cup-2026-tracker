name: Import optional public data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    env:
      PUBLIC_DATA_URL: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Import optional public data
        run: npm run data:import-public
      - name: Commit imported data if changed
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- public/data/imported-worldcup-2026.json)" ]; then
            echo "No imported data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/imported-worldcup-2026.json
          git commit -m "Update optional public data import"
          git push
